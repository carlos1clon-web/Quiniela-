<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela Liga MX</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            text-align: center;
            padding: 20px;
        }
        header {
            background-color: #004d40;
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .partido {
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            margin: 15px auto;
            border-radius: 12px;
            max-width: 500px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .equipo { font-weight: bold; flex: 1; }
        input {
            width: 50px;
            padding: 8px;
            text-align: center;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin: 0 10px;
        }
        button {
            background-color: #d32f2f;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🏆 Mi Quiniela Liga MX</h1>
        <p>Jornada 1 - ¡Haz tu pronóstico!</p>
    </header>

    <main>
        <div class="partido">
            <span class="equipo">América</span>
            <input type="number" placeholder="0" min="0">
            <span>vs</span>
            <input type="number" placeholder="0" min="0">
            <span class="equipo">Chivas</span>
        </div>

        <div class="partido">
            <span class="equipo">Cruz Azul</span>
            <input type="number" placeholder="0" min="0">
            <span>vs</span>
            <input type="number" placeholder="0" min="0">
            <span class="equipo">Pumas</span>
        </div>

        <button type="button">Guardar Resultados</button>
    </main>

</body>
</html>
